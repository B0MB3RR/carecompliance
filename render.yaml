# Render Blueprint - deploys the Express API and a managed PostgreSQL
# instance together. Import this repo at https://render.com/deploy and
# Render will read this file automatically.
#
# Netlify does not run persistent Node servers (its functions are
# short-lived and serverless), so the backend - which holds a PostgreSQL
# connection pool, writes uploaded files and generated PDFs to disk, and
# expects to run continuously - needs a host built for that. Render (or
# Railway/Fly.io) fits; Netlify stays responsible for the static frontend
# only. See README.md "Deployment" for the full walkthrough.

services:
  - type: web
    name: carecompliance-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: carecompliance-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # Update this to your actual Netlify site URL after your first deploy -
      # it's what the backend's CORS policy allows requests from.
      - key: FRONTEND_URL
        value: https://your-site-name.netlify.app
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_UPLOAD_MB
        value: "20"

databases:
  - name: carecompliance-db
    plan: free
    postgresMajorVersion: "16"
